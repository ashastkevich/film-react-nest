services:
  database:
    image: postgres:16.4
    environment:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data

    networks:
      - internal
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4_container
    restart: unless-stopped
    ports:
      - '8080:80'
    environment:
      - .env
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - internal
  
  frontend:
    image: 'ghcr.io/ashastkevich/film-react-nest-frontend:latest'
    environment:
      - .env
    volumes:
      - frontend_build:/app/dist
    restart: unless-stopped


  backend:
    image: 'ghcr.io/ashastkevich/film-react-nest-backend:latest'
    environment:
      - .env
    ports:
      - 3000:3000
    networks:
      - internal
    depends_on:
      - database
    restart: unless-stopped

  
  server:
    image: 'ghcr.io/ashastkevich/film-react-nest-server:latest'
    ports:
      - 81:80
    volumes:
      - frontend_build:/var/www
    depends_on:
      - frontend
      - backend
    networks:
      - internal
    restart: unless-stopped


volumes:
  db_data:
  pgadmin-data:
  frontend_build:

networks:
  internal:
